<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi Ijazah - UMS</title>

<style>
body {
    margin: 0;
    font-family: "Times New Roman", serif;
    background: #f4f6f9;
}

/* TOP BAR */
.top-bar {
    background: #0d47a1;
    color: white;
    padding: 12px 20px;
    font-size: 14px;
}

/* CONTAINER */
.container {
    text-align: center;
    padding: 30px 15px;
}

/* LOGO */
.logo {
    width: 80px;
    margin-bottom: 10px;
}

/* TITLE */
h2 { margin: 5px; }
h3 { margin: 5px; color: #444; font-weight: normal; }

/* CAPTCHA */
.captcha-box {
    margin: 20px auto;
    background: #eee;
    padding: 10px;
    width: 140px;
    letter-spacing: 4px;
    font-weight: bold;
    border-radius: 5px;
}

/* INPUT */
input {
    width: 90%;
    max-width: 320px;
    padding: 10px;
    margin: 8px auto;
    display: block;
    border: 1px solid #ccc;
    border-radius: 5px;
}

/* BUTTON */
button {
    background: #0d47a1;
    color: white;
    padding: 10px 30px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #08306b;
}

/* LOADING */
#loading {
    margin-top: 15px;
    font-style: italic;
}

/* PAGE TRANSITION */
.page {
    transition: all 0.5s ease;
}

.hidden {
    opacity: 0;
    transform: translateY(20px);
    pointer-events: none;
    position: absolute;
    width: 100%;
}

/* RESULT CARD */
.card {
    background: white;
    max-width: 500px;
    margin: 30px auto;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
    text-align: left;
}

.header-card {
    text-align: center;
}

.valid {
    color: green;
    font-size: 20px;
    font-weight: bold;
}

.invalid {
    color: red;
    text-align: center;
    font-weight: bold;
}

.label {
    font-weight: bold;
}

/* FOOTER */
.footer {
    margin-top: 40px;
    padding: 20px;
    background: #0d47a1;
    color: white;
    font-size: 12px;
    text-align: center;
}

/* RESPONSIVE */
@media (max-width: 500px) {
    .card {
        margin: 20px 10px;
        padding: 20px;
    }
}
</style>

</head>
<body>

<div class="top-bar">verifikasi.ums.ac.id</div>

<!-- HALAMAN 1 -->
<div id="page1" class="page container">
    <img src="https://upload.wikimedia.org/wikipedia/id/thumb/5/5c/Logo_UMS.png/200px-Logo_UMS.png" class="logo">

    <h2>Verifikasi Ijazah</h2>
    <h3>Universitas Muhammadiyah Surakarta</h3>

    <div class="captcha-box" id="captcha">XZ3X3T</div>

    <input type="text" id="captchaInput" placeholder="Masukkan kode di atas">
    <input type="text" id="searchInput" placeholder="Cari Nama atau NIM">

    <button onclick="verifikasi()">Tampilkan</button>

    <div id="loading" class="hidden">Memuat data akademik...</div>
</div>

<!-- HALAMAN 2 -->
<div id="page2" class="page hidden">
    <div id="result"></div>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Universitas Muhammadiyah Surakarta<br>
    Sistem Verifikasi Ijazah Online<br>
    Alamat: Jl. A. Yani Tromol Pos 1, Pabelan, Surakarta<br>
    Email: info@ums.ac.id | Website: www.ums.ac.id
</div>

<script>
const database = [
    {
        nama: "Muhammad Agil",
        nim: "A12345",
        jurusan: "Manajemen",
        fakultas: "Ekonomi dan Bisnis",
        tahun: "2024",
        ipk: "3.85",
        status: "VALID",
        noIjazah: "UMS-2024-00123"
    }
];

function verifikasi() {
    let captcha = document.getElementById("captcha").innerText.toLowerCase();
    let inputCaptcha = document.getElementById("captchaInput").value.toLowerCase();
    let keyword = document.getElementById("searchInput").value.toLowerCase();

    if (captcha !== inputCaptcha) {
        alert("Captcha salah!");
        return;
    }

    document.getElementById("loading").classList.remove("hidden");

    setTimeout(() => {
        document.getElementById("loading").classList.add("hidden");

        let data = database.find(d =>
            d.nama.toLowerCase().includes(keyword) ||
            d.nim.toLowerCase().includes(keyword)
        );

        let resultHTML;

        if (data) {
            resultHTML = `
            <div class="card">
                <div class="header-card">
                    <h2>Status Ijazah</h2>
                    <div class="valid">${data.status}</div>
                </div>
                <hr>
                <p><span class="label">Nama:</span> ${data.nama}</p>
                <p><span class="label">NIM:</span> ${data.nim}</p>
                <p><span class="label">Nomor Ijazah:</span> ${data.noIjazah}</p>
                <p><span class="label">Program Studi:</span> ${data.jurusan}</p>
                <p><span class="label">Fakultas:</span> ${data.fakultas}</p>
                <p><span class="label">Tahun Lulus:</span> ${data.tahun}</p>
                <p><span class="label">IPK:</span> ${data.ipk}</p>
            </div>`;
        } else {
            resultHTML = `<div class="card"><p class="invalid">Data tidak ada</p></div>`;
        }

        document.getElementById("result").innerHTML = resultHTML;

        // TRANSISI HALAMAN
        document.getElementById("page1").classList.add("hidden");
        document.getElementById("page2").classList.remove("hidden");

    }, 1500);
}
</script>

</body>
</html>
