<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi Ijazah - UMS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:"Times New Roman", serif;
background:linear-gradient(135deg,#eef2f7,#cfd9e6);
}

/* HEADER */
.header{
background:#0d47a1;
color:#fff;
padding:12px 20px;
}

/* CONTAINER */
.container{
max-width:650px;
margin:auto;
padding:30px 20px;
position:relative;
}

/* PAGE */
.page{
position:absolute;
width:100%;
opacity:0;
transform:translateX(40px);
transition:.4s;
pointer-events:none;
}
.page.active{
opacity:1;
transform:translateX(0);
pointer-events:auto;
}

/* CARD */
.card{
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,.1);
}

/* SEARCH */
.logo{width:100px;margin:auto;display:block;}
.title{text-align:center;font-size:22px;font-weight:bold;margin-top:10px;}
.subtitle{text-align:center;color:#0d47a1;margin-bottom:20px;}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#0d47a1;
color:#fff;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

/* LOADING */
#loading{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:#fff;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

.loader{
width:50px;height:50px;
border:4px solid #ddd;
border-top:4px solid #0d47a1;
border-radius:50%;
animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* ===== IDENTITAS ===== */

/* LOGO BOX */
.logo-box{
text-align:center;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
margin-bottom:15px;
}

.logo-box img{
width:80px;
}

/* NAMA */
.nama{
text-align:center;
font-size:20px;
font-weight:bold;
margin-top:10px;
}

/* IDENTITAS BOX */
.data-box{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.08);
margin-top:15px;
}

/* ROW VARIASI */
.row{
display:flex;
justify-content:space-between;
padding:10px 15px;
font-size:14px;
}

.row:nth-child(odd){background:#ffffff;}
.row:nth-child(even){background:#f3f7ff;}

.label{font-weight:bold;}
.value{}

/* BOX IJAZAH */
.ijazah-box{
background:#fff;
margin-top:15px;
padding:15px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
border-left:5px solid #4caf50;
}

.ijazah-row{
display:flex;
justify-content:space-between;
margin:6px 0;
font-size:14px;
}

.status-valid{
color:#2e7d32;
font-weight:bold;
}

/* FOOTER */
.footer{
margin-top:20px;
text-align:center;
font-size:12px;
color:#555;
}

/* MOBILE */
@media(max-width:600px){
.row,.ijazah-row{flex-direction:column;}
}
</style>
</head>

<body>

<div class="header">verifikasi.ums.ac.id</div>

<div id="loading">
<div class="loader"></div>
<p>Memuat data akademik...</p>
</div>

<div class="container">

<!-- SEARCH -->
<div id="searchPage" class="page active">

<img src="https://upload.wikimedia.org/wikipedia/id/thumb/5/5c/Logo_UMS.png/200px-Logo_UMS.png" class="logo">

<div class="title">Verifikasi Ijazah</div>
<div class="subtitle">Universitas Muhammadiyah Surakarta</div>

<div class="card">
<input type="text" id="keyword" placeholder="Masukkan Nama atau NIM">
<button onclick="cari()">Tampilkan</button>

<div class="footer">
© 2026 Universitas Muhammadiyah Surakarta
</div>
</div>

</div>

<!-- RESULT -->
<div id="resultPage" class="page">

<!-- LOGO BOX -->
<div class="logo-box">
<img src="https://upload.wikimedia.org/wikipedia/id/thumb/5/5c/Logo_UMS.png/200px-Logo_UMS.png">
<div class="nama" id="nama"></div>
</div>

<!-- DATA -->
<div class="data-box" id="data"></div>

<!-- IJAZAH BOX -->
<div class="ijazah-box">
<div class="ijazah-row">
<span>No Ijazah</span>
<span id="ijazah"></span>
</div>
<div class="ijazah-row">
<span>Status Dokumen</span>
<span class="status-valid">VALID</span>
</div>
</div>

<div class="footer">
Nomor Verifikasi: UMS-VER-<span id="verif"></span><br><br>
© 2026 Universitas Muhammadiyah Surakarta
</div>

<button onclick="kembali()">Kembali</button>

</div>

</div>

<script>
const dataMahasiswa={
nama:"Muhammad Agil",
nim:"09011281924045",
nik:"337401xxxxxxxxxx",
prodi:"Informatika",
fakultas:"Teknik",
tahun:"2024",
ipk:"3.85",
ijazah:"602012024000123"
};

function cari(){
let key=document.getElementById("keyword").value.toLowerCase();

if(!key){alert("Masukkan Nama atau NIM");return;}

document.getElementById("loading").style.display="flex";

setTimeout(()=>{

document.getElementById("loading").style.display="none";

if(key.includes("agil")||key.includes("09011281924045")){

document.getElementById("nama").innerText=dataMahasiswa.nama;
document.getElementById("ijazah").innerText=dataMahasiswa.ijazah;

document.getElementById("data").innerHTML=`
<div class="row"><span class="label">NIM</span><span>${dataMahasiswa.nim}</span></div>
<div class="row"><span class="label">NIK</span><span>${dataMahasiswa.nik}</span></div>
<div class="row"><span class="label">Program Studi</span><span>${dataMahasiswa.prodi}</span></div>
<div class="row"><span class="label">Fakultas</span><span>${dataMahasiswa.fakultas}</span></div>
<div class="row"><span class="label">Tahun Lulus</span><span>${dataMahasiswa.tahun}</span></div>
<div class="row"><span class="label">IPK</span><span>${dataMahasiswa.ipk}</span></div>
`;

document.getElementById("verif").innerText=Math.floor(Math.random()*999999);

switchPage("searchPage","resultPage");

}else{
alert("Data tidak ditemukan");
}

},1500);
}

function switchPage(from,to){
document.getElementById(from).classList.remove("active");
setTimeout(()=>{document.getElementById(to).classList.add("active");},150);
}

function kembali(){
switchPage("resultPage","searchPage");
}
</script>

</body>
</html>
