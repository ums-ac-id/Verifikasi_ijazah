<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi Ijazah - UMS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:"Times New Roman", serif;
background:linear-gradient(135deg,#f5f7fa,#c3cfe2);
min-height:100vh;
}

/* HEADER */
.header{
background:#0d47a1;
color:#fff;
padding:12px 20px;
font-size:14px;
}

/* CONTAINER */
.container{
max-width:600px;
margin:auto;
padding:30px 20px;
position:relative;
}

/* PAGE */
.page{
position:absolute;
top:0;left:0;right:0;
opacity:0;
transform:translateX(50px);
transition:all .5s ease-in-out;
pointer-events:none;
}

.page.active{
opacity:1;
transform:translateX(0);
pointer-events:auto;
}

/* LOGO */
.logo{
width:100px;
margin:0 auto 15px;
display:block;
}

/* TITLE */
.title{text-align:center;font-size:22px;font-weight:bold;}
.subtitle{text-align:center;color:#0d47a1;margin-bottom:20px;}

/* CARD */
.card{
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 25px rgba(0,0,0,.1);
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

/* BUTTON */
button{
width:100%;
padding:12px;
background:#0d47a1;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}

/* CAPTCHA */
.captcha{
background:#eee;
padding:12px;
text-align:center;
letter-spacing:5px;
font-weight:bold;
}

/* LOADING */
#loading{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:#fff;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

.loader{
width:50px;height:50px;
border:4px solid #ddd;
border-top:4px solid #0d47a1;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0);}
100%{transform:rotate(360deg);}
}

/* IDENTITY */
.identity{
position:relative;
}

.watermark{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:300px;
opacity:0.05;
pointer-events:none;
}

.identity-header{
text-align:center;
border-bottom:1px solid #ddd;
padding-bottom:15px;
}

.identity-header img{
width:80px;
margin-bottom:10px;
}

.identity-name{
font-size:20px;
font-weight:bold;
}

.status{
color:green;
font-weight:bold;
}

.info{
margin-top:15px;
}

.info p{
margin:6px 0;
}

/* FOOTER */
.footer{
margin-top:30px;
text-align:center;
font-size:12px;
color:#555;
}
</style>
</head>

<body>

<div class="header">verifikasi.ums.ac.id</div>

<!-- LOADING -->
<div id="loading">
<div class="loader"></div>
<p style="margin-top:15px;">Memuat data akademik...</p>
</div>

<div class="container">

<!-- PAGE 1 -->
<div id="page1" class="page active">

<img src="https://upload.wikimedia.org/wikipedia/id/thumb/5/5c/Logo_UMS.png/200px-Logo_UMS.png" class="logo">

<div class="title">Verifikasi Ijazah</div>
<div class="subtitle">Universitas Muhammadiyah Surakarta</div>

<div class="card">
<div class="captcha" id="captcha">XZ3X3T</div>
<input type="text" id="captchaInput" placeholder="Masukkan kode">
<input type="text" id="searchInput" placeholder="Nama / NIM">
<button onclick="verifikasi()">Tampilkan</button>
</div>

</div>

<!-- PAGE 2 (IDENTITAS) -->
<div id="page2" class="page">

<div class="card identity">

<img src="https://upload.wikimedia.org/wikipedia/id/thumb/5/5c/Logo_UMS.png/200px-Logo_UMS.png" class="watermark">

<div class="identity-header">
<img src="https://upload.wikimedia.org/wikipedia/id/thumb/5/5c/Logo_UMS.png/200px-Logo_UMS.png">
<div class="identity-name" id="nama"></div>
<div id="nim"></div>
<div class="status">STATUS IJAZAH VALID</div>
</div>

<div class="info" id="data"></div>

<div class="footer">
Diverifikasi oleh Universitas Muhammadiyah Surakarta<br>
Nomor Verifikasi: UMS-VER-<span id="verif"></span>
</div>

<button onclick="kembali()">Kembali</button>

</div>

</div>

</div>

<script>
const db={
nama:"Muhammad Agil",
nim:"09011281924045",
prodi:"Informatika",
fakultas:"Teknik",
tahun:"2024",
ipk:"3.85",
ijazah:"602012024000123"
};

function verifikasi(){
let cap=document.getElementById("captcha").innerText.toLowerCase();
let input=document.getElementById("captchaInput").value.toLowerCase();
let key=document.getElementById("searchInput").value.toLowerCase();

if(cap!==input){alert("Captcha salah");return;}

document.getElementById("loading").style.display="flex";

setTimeout(()=>{

document.getElementById("loading").style.display="none";

if(key.includes("agil")||key.includes("09011281924045")){

document.getElementById("nama").innerText=db.nama;
document.getElementById("nim").innerText="NIM: "+db.nim;

document.getElementById("data").innerHTML=`
<p><b>Program Studi:</b> ${db.prodi}</p>
<p><b>Fakultas:</b> ${db.fakultas}</p>
<p><b>Tahun Lulus:</b> ${db.tahun}</p>
<p><b>IPK:</b> ${db.ipk}</p>
<p><b>No Ijazah:</b> ${db.ijazah}</p>
`;

document.getElementById("verif").innerText=Math.floor(Math.random()*999999);

transisi("page1","page2");

}else{
alert("Data tidak ada");
}

},1500);
}

function transisi(from,to){
let p1=document.getElementById(from);
let p2=document.getElementById(to);

p1.classList.remove("active");

setTimeout(()=>{
p2.classList.add("active");
},200);
}

function kembali(){
transisi("page2","page1");
}
</script>

</body>
</html>
